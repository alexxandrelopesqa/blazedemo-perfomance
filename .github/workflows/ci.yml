name: blazedemo-performance

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:
  # Diario 08:00, 12:00 e 18:00 America/Sao_Paulo (UTC-3) => 11:00, 15:00 e 21:00 UTC; cron do Actions e sempre UTC
  schedule:
    - cron: "0 11 * * *"
    - cron: "0 15 * * *"
    - cron: "0 21 * * *"

concurrency:
  group: blazedemo-performance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  performance-check:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Preparar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Compilar ferramenta JTL para Allure (Java)
        run: mvn -f jtl-allure/pom.xml -q package -DskipTests

      - name: Preparar Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Restaurar historico do Allure
        uses: actions/cache@v4
        with:
          path: .allure-history
          key: allure-history-${{ github.ref_name }}
          restore-keys: |
            allure-history-

      - name: Instalar JMeter 5.6.3
        run: |
          curl -fsSL https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz -o apache-jmeter-5.6.3.tgz
          curl -fsSL https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz.sha512 -o apache-jmeter-5.6.3.tgz.sha512
          sha512sum -c apache-jmeter-5.6.3.tgz.sha512
          tar -xzf apache-jmeter-5.6.3.tgz
          mv apache-jmeter-5.6.3 "${HOME}/jmeter"
          rm -f apache-jmeter-5.6.3.tgz apache-jmeter-5.6.3.tgz.sha512
          cp docker/user.properties "${HOME}/jmeter/bin/user.properties"

      - name: Instalar Allure CLI
        run: npm install --global --ignore-scripts allure-commandline@2.34.1

      - name: Rodar teste de carga (alvo ~30 RPS)
        run: |
          mkdir -p results/load/dashboard
          "${HOME}/jmeter/bin/jmeter" -n -t scripts/load_test.jmx -l results/load/load.jtl -j results/load/jmeter.log -e -o results/load/dashboard

      - name: Rodar teste de pico (alvo ~70 RPS)
        run: |
          mkdir -p results/peak/dashboard
          "${HOME}/jmeter/bin/jmeter" -n -t scripts/peak_test.jmx -l results/peak/peak.jtl -j results/peak/jmeter.log -e -o results/peak/dashboard

      - name: Converter JTL para Allure
        env:
          TARGET_URL: https://www.blazedemo.com
          ACCEPTANCE_P90_MS: "8000"
          JMETER_VERSION: "5.6.3"
        run: |
          mkdir -p allure-results .allure-history
          if [ -d ".allure-history/history" ]; then
            mkdir -p allure-results/history
            cp -r .allure-history/history/. allure-results/history/ || true
          fi
          ACCEPTANCE_RPS=22 java -jar jtl-allure/target/jtl-allure-1.0.0.jar results/load/load.jtl allure-results "Load 30 RPS"
          ACCEPTANCE_RPS=50 java -jar jtl-allure/target/jtl-allure-1.0.0.jar results/peak/peak.jtl allure-results "Peak 70 RPS"

      - name: Gerar relatorio Allure
        run: |
          mkdir -p results/allure-report
          allure generate allure-results --clean -o results/allure-report
          rm -rf .allure-history/history
          mkdir -p .allure-history/history
          cp -r results/allure-report/history/. .allure-history/history/ || true

      - name: Publicar artefatos da execucao
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blazedemo-performance-reports
          retention-days: 14
          path: |
            results/load/load.jtl
            results/load/jmeter.log
            results/load/dashboard
            results/peak/peak.jtl
            results/peak/jmeter.log
            results/peak/dashboard
            allure-results
            results/allure-report

      - name: Montar site do GitHub Pages
        if: always()
        run: |
          mkdir -p pages
          if [ -d "results/load/dashboard" ]; then
            cp -r results/load/dashboard pages/load-dashboard
          else
            mkdir -p pages/load-dashboard
            echo "Dashboard de carga nao gerado nesta execucao." > pages/load-dashboard/index.html
          fi
          if [ -d "results/peak/dashboard" ]; then
            cp -r results/peak/dashboard pages/peak-dashboard
          else
            mkdir -p pages/peak-dashboard
            echo "Dashboard de pico nao gerado nesta execucao." > pages/peak-dashboard/index.html
          fi
          if [ -d "results/allure-report" ]; then
            cp -r results/allure-report pages/allure-report
          else
            mkdir -p pages/allure-report
            echo "Relatorio Allure nao gerado nesta execucao." > pages/allure-report/index.html
          fi
          cat > pages/index.html <<'HTML'
          <!doctype html>
          <html lang="pt-BR">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>BlazeDemo - relatorios de performance</title>
            <style>
              body { font-family: Arial, sans-serif; margin: 2rem; color: #1f2937; }
              h1 { margin-bottom: 0.2rem; }
              p { margin-top: 0.2rem; color: #4b5563; }
              ul { margin-top: 1rem; line-height: 1.8; }
              a { color: #2563eb; text-decoration: none; }
              a:hover { text-decoration: underline; }
            </style>
          </head>
          <body>
            <h1>BlazeDemo - relatorios de performance</h1>
            <p>Saída do workflow GitHub Actions.</p>
            <ul>
              <li><a href="./load-dashboard/index.html">JMeter - load</a></li>
              <li><a href="./peak-dashboard/index.html">JMeter - peak</a></li>
              <li><a href="./allure-report/index.html">Allure Report</a></li>
            </ul>
          </body>
          </html>
          HTML

      - name: Configurar GitHub Pages
        if: always() && github.event_name != 'pull_request' && (github.ref_name == 'main' || github.ref_name == 'master')
        uses: actions/configure-pages@v5

      - name: Publicar artefato do Pages
        if: always() && github.event_name != 'pull_request' && (github.ref_name == 'main' || github.ref_name == 'master')
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy-pages:
    if: always() && github.event_name != 'pull_request' && (github.ref_name == 'main' || github.ref_name == 'master')
    needs: performance-check
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy para GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
