# Logging and result format optimization
jmeter.save.saveservice.output_format=csv
jmeter.save.saveservice.assertion_results=none
jmeter.save.saveservice.response_data=false
jmeter.save.saveservice.samplerData=false
jmeter.save.saveservice.response_headers=false
jmeter.save.saveservice.requestHeaders=false
jmeter.save.saveservice.print_field_names=true
jmeter.save.saveservice.thread_counts=true
jmeter.save.saveservice.bytes=true
jmeter.save.saveservice.sent_bytes=true
jmeter.save.saveservice.connect_time=true
jmeter.save.saveservice.latency=true

# Reduce parser pressure and memory footprint
httpsampler.max_redirects=3
httpclient4.retrycount=0
httpclient.reset_state_on_thread_group_iteration=true
sampleresult.timestamp.start=true
jsr223.compiled_scripts_cache_size=500

# Heap defaults can be overridden by JMETER_HEAP env
heap=-Xms1g -Xmx2g -XX:MaxMetaspaceSize=256m
